services:
  archive:
    build: .
    container_name: ladyzenko-photo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "file:/app/data/archive.db"
      STORAGE_DIR: "/app/storage"
      NODE_ENV: "production"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
